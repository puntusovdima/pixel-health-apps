<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#0a0a0b" />
<title>Health</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0b; --surface:#141416; --surface-2:#1b1b1f;
    --line:#26262b; --line-2:#34343a;
    --fg:#fafafa; --muted:#a1a1aa; --faint:#6f6f78;
    --accent:#f5a524; --accent-ink:#1c1304;
    --r-lg:22px; --ease:cubic-bezier(.23,1,.32,1);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; height:100%}
  body{
    background:var(--bg); color:var(--fg);
    font:400 16px/1.45 "Geist",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased; letter-spacing:-0.01em;
    display:flex; flex-direction:column; min-height:100dvh;
    padding:calc(env(safe-area-inset-top) + 26px) 20px calc(env(safe-area-inset-bottom) + 26px);
  }
  header{margin-bottom:auto}
  h1{font-size:26px; font-weight:700; letter-spacing:-0.03em; margin:0}
  .sub{color:var(--faint); font-size:14px; margin-top:4px}
  .cards{display:flex; flex-direction:column; gap:12px; margin:auto 0}
  .card{
    display:flex; align-items:center; gap:16px; text-decoration:none; color:var(--fg);
    background:var(--surface); border:1px solid var(--line); border-radius:var(--r-lg);
    padding:20px; transition:border-color .18s var(--ease), background .18s var(--ease), transform .12s var(--ease);
  }
  .card:active{transform:scale(.985); border-color:var(--accent); background:var(--surface-2)}
  .card .ico{width:52px; height:52px; flex:none; border-radius:14px; background:var(--surface-2);
    display:flex; align-items:center; justify-content:center; font-size:26px; border:1px solid var(--line-2)}
  .card .meta{flex:1; min-width:0}
  .card .nm{font-size:18px; font-weight:600}
  .card .ds{color:var(--muted); font-size:13px; margin-top:2px}
  .card .go{color:var(--faint); font-size:22px; font-weight:600}
  footer{margin-top:auto; color:var(--faint); font-size:12px; text-align:center; padding-top:22px}
  :focus-visible{outline:2px solid var(--accent); outline-offset:3px}
</style>
</head>
<body>
  <header>
    <h1>Health</h1>
    <div class="sub">Pick a tool</div>
  </header>

  <div class="cards">
    <a class="card" href="work-mode/">
      <div class="ico">🎯</div>
      <div class="meta"><div class="nm">Work Mode</div><div class="ds">Pomodoro focus with movement breaks</div></div>
      <div class="go">›</div>
    </a>
    <a class="card" href="plank/">
      <div class="ico">🪵</div>
      <div class="meta"><div class="nm">Plank Coach</div><div class="ds">Timed plank programs and variations</div></div>
      <div class="go">›</div>
    </a>
    <a class="card" href="wave/">
      <div class="ico">🌊</div>
      <div class="meta"><div class="nm">Spine Wave</div><div class="ds">Where you are on the flare cycle</div></div>
      <div class="go">›</div>
    </a>
  </div>

  <footer>Move a little, feel a lot.</footer>

<script>
  const TG = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
  if (TG){ try{ TG.ready(); TG.expand(); }catch(e){} }
</script>
</body>
</html>
