<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#0a0a0b" />
<title>Plank Coach</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0b; --surface:#141416; --surface-2:#1b1b1f;
    --line:#26262b; --line-2:#34343a;
    --fg:#fafafa; --muted:#a1a1aa; --faint:#6f6f78;
    --accent:#f5a524; --accent-ink:#1c1304; --accent-soft:rgba(245,165,36,.13);
    --rest:#34d399; --rest-ink:#05271a; --rest-soft:rgba(52,211,153,.12);
    --r-lg:22px; --r-md:15px; --r-pill:999px;
    --ease:cubic-bezier(.23,1,.32,1);
    --pad: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; height:100%}
  body{
    background:var(--bg); color:var(--fg);
    font:400 16px/1.45 "Geist",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased; letter-spacing:-0.01em;
    display:flex; flex-direction:column; min-height:100dvh; padding:var(--pad);
  }
  ::selection{background:var(--accent-soft)}
  button{font-family:inherit; letter-spacing:-0.01em}
  :focus-visible{outline:2px solid var(--accent); outline-offset:2px; border-radius:6px}

  header{padding:20px 22px 4px; display:flex; align-items:baseline; justify-content:space-between}
  header h1{font-size:19px; font-weight:700; margin:0; letter-spacing:-0.02em}
  header .sub{color:var(--faint); font-size:13px; font-weight:500}
  .clock{color:var(--faint); font:600 13px/1 "Geist Mono",monospace; font-variant-numeric:tabular-nums}
  main{flex:1; display:flex; flex-direction:column; padding:12px 18px 20px; gap:14px}

  .screen{display:none; flex-direction:column; gap:14px; flex:1}
  .screen.active{display:flex}
  .label{color:var(--faint); font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:.08em; margin:4px 2px 0}

  .programs{display:flex; flex-direction:column; gap:9px}
  .prog{
    background:var(--surface); border:1px solid var(--line); border-radius:var(--r-lg);
    padding:15px 17px; display:flex; align-items:center; gap:15px; cursor:pointer;
    transition:border-color .18s var(--ease), background .18s var(--ease), transform .12s var(--ease);
    text-align:left; width:100%;
  }
  .prog:active{transform:scale(.99)}
  .prog.sel{border-color:var(--accent); background:var(--surface-2)}
  .prog .idx{font:700 20px/1 "Geist Mono",monospace; color:var(--faint); width:20px; text-align:center; transition:color .18s}
  .prog.sel .idx{color:var(--accent)}
  .prog .meta{flex:1; min-width:0}
  .prog .name{font-weight:600; font-size:16px}
  .prog .desc{color:var(--muted); font-size:13px; margin-top:1px}
  .prog .tag{color:var(--faint); font:600 12px/1 "Geist Mono",monospace; white-space:nowrap}

  .panel{background:var(--surface); border:1px solid var(--line); border-radius:var(--r-lg); padding:16px 18px; display:flex; flex-direction:column; gap:18px}
  .slider .row{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:9px}
  .slider .row span:first-child{font-size:14px; color:var(--fg); font-weight:500}
  .slider .val{font:700 14px/1 "Geist Mono",monospace; color:var(--accent); font-variant-numeric:tabular-nums}
  input[type=range]{-webkit-appearance:none; appearance:none; width:100%; height:4px; border-radius:var(--r-pill); background:var(--line-2); outline:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none; width:20px; height:20px; border-radius:50%; background:var(--accent); border:3px solid var(--bg); box-shadow:0 0 0 1px var(--accent); cursor:pointer; transition:transform .12s var(--ease)}
  input[type=range]:active::-webkit-slider-thumb{transform:scale(1.15)}
  input[type=range]::-moz-range-thumb{width:17px; height:17px; border-radius:50%; background:var(--accent); border:3px solid var(--bg); cursor:pointer}

  .switch{display:flex; align-items:center; gap:12px; cursor:pointer; font-size:14px; color:var(--fg); user-select:none}
  .switch input{position:absolute; opacity:0; width:0; height:0}
  .track{position:relative; width:42px; height:25px; border-radius:var(--r-pill); background:var(--line-2); flex:none; transition:background .2s var(--ease)}
  .track::after{content:""; position:absolute; top:3px; left:3px; width:19px; height:19px; border-radius:50%; background:#fff; transition:transform .2s var(--ease)}
  .switch input:checked + .track{background:var(--accent)}
  .switch input:checked + .track::after{transform:translateX(17px)}
  .switch input:focus-visible + .track{outline:2px solid var(--accent); outline-offset:2px}

  .btn{
    border:none; border-radius:var(--r-md); padding:16px; font-size:16px; font-weight:600; color:var(--accent-ink);
    background:var(--accent); cursor:pointer; width:100%; transition:transform .12s var(--ease), filter .15s, opacity .15s;
  }
  .btn:active{transform:scale(.975)}
  .btn:disabled{opacity:.5; cursor:default}
  .btn.ghost{background:transparent; color:var(--fg); border:1px solid var(--line-2)}
  .btn.ghost:active{background:var(--surface)}
  .btn.wide{margin-top:auto}
  .btn .k{font:700 13px/1 "Geist Mono",monospace; opacity:.7; margin-left:2px}

  #run{align-items:center; text-align:center; gap:12px}
  .stage{font:600 12px/1 "Geist Mono",monospace; letter-spacing:.16em; text-transform:uppercase; color:var(--faint)}
  .stage.break{color:var(--rest)}
  .exname{font-size:22px; font-weight:700; letter-spacing:-0.02em; margin:0}
  .poseWrap{position:relative; width:min(76vw,300px); aspect-ratio:1/1; margin:2px auto}
  .ring{position:absolute; inset:0; transform:rotate(-90deg)}
  .ring .bg{stroke:var(--line)}
  #ringFg{transition:stroke .3s}
  .poseSvg{position:absolute; inset:15%; display:flex; align-items:center; justify-content:center}
  .poseSvg svg{width:100%; height:100%}
  .time{font:700 60px/1 "Geist Mono",monospace; font-variant-numeric:tabular-nums; letter-spacing:-0.02em; margin:0}
  .time.break{color:var(--rest)}
  .cue{color:var(--muted); font-size:14px; line-height:1.5; min-height:2.9em; padding:0 6px; max-width:360px}
  .dots{display:flex; gap:6px; flex-wrap:wrap; justify-content:center; max-width:320px}
  .dot{width:8px; height:8px; border-radius:50%; background:var(--line-2); transition:background .2s var(--ease), transform .2s var(--ease)}
  .dot.done{background:var(--rest)} .dot.cur{background:var(--accent); transform:scale(1.4)}
  .upnext{color:var(--faint); font-size:13px; font-weight:500}
  .upnext b{color:var(--fg); font-weight:600}
  .controls{display:flex; gap:9px; width:100%; max-width:440px; margin-top:auto}
  .controls .btn{flex:1; padding:15px 10px; font-size:15px}

  #done{align-items:center; text-align:center; justify-content:center; gap:18px}
  #done .big{font-size:26px; font-weight:700; letter-spacing:-0.02em}
  #done .stat{color:var(--muted); font:600 14px/1.5 "Geist Mono",monospace; font-variant-numeric:tabular-nums}
  .card{background:var(--surface); border:1px solid var(--line); border-radius:var(--r-lg); padding:18px 20px; max-width:360px; text-align:left}
  .card .t{font-weight:600; color:var(--rest); margin-bottom:5px}
  .card div:last-child{color:var(--muted); font-size:14px; line-height:1.5}
  .card b{color:var(--fg); font-weight:600}

  @media (prefers-reduced-motion: reduce){ *{transition:none !important} }
</style>
</head>
<body>
<header>
  <div><h1>Plank Coach</h1><div class="sub" id="sub">Pick a program</div></div>
  <div class="clock" id="clock"></div>
</header>
<main>

  <!-- SETUP -->
  <section id="setup" class="screen active">
    <div class="label">Program</div>
    <div class="programs" id="programs"></div>

    <div class="label">Timing</div>
    <div class="panel">
      <div class="slider">
        <div class="row"><span>Break between holds</span><span class="val"><span id="breakVal">20</span>s</span></div>
        <input type="range" id="breakSlider" min="5" max="60" step="5" value="20" aria-label="Break seconds" />
      </div>
      <div class="slider">
        <div class="row"><span>Hold length</span><span class="val"><span id="workVal">100</span>%</span></div>
        <input type="range" id="workSlider" min="50" max="150" step="10" value="100" aria-label="Hold length percent" />
      </div>
      <label class="switch"><input type="checkbox" id="soundChk" checked /><span class="track"></span><span>Beep and buzz on transitions</span></label>
    </div>

    <button class="btn wide" id="startBtn">Start <span class="k" id="startLen"></span></button>
  </section>

  <!-- RUN -->
  <section id="run" class="screen">
    <div class="stage" id="stage">HOLD</div>
    <div class="exname" id="exname"></div>
    <div class="poseWrap">
      <svg class="ring" viewBox="0 0 100 100">
        <circle class="bg" cx="50" cy="50" r="46" fill="none" stroke-width="4"/>
        <circle id="ringFg" cx="50" cy="50" r="46" fill="none" stroke="var(--accent)" stroke-width="4"
          stroke-linecap="round" stroke-dasharray="289.02" stroke-dashoffset="0"/>
      </svg>
      <div class="poseSvg" id="pose"></div>
    </div>
    <div class="time" id="time">00</div>
    <div class="cue" id="cue"></div>
    <div class="dots" id="dots"></div>
    <div class="upnext" id="upnext"></div>
    <div class="controls">
      <button class="btn ghost" id="skipBtn">Skip</button>
      <button class="btn" id="pauseBtn">Pause</button>
      <button class="btn ghost" id="stopBtn">Stop</button>
    </div>
  </section>

  <!-- DONE -->
  <section id="done" class="screen">
    <div class="big">Done</div>
    <div class="stat" id="doneStat"></div>
    <div class="card">
      <div class="t">Feeling strong?</div>
      <div>That core carries over to the wall. Consider a session at <b>Sputnik</b>. Bouldering beats another day at the desk.</div>
    </div>
    <button class="btn" id="againBtn" style="max-width:360px">Do another</button>
  </section>

</main>

<script>
/* ---------------- Telegram glue ---------------- */
const TG = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
if (TG){ try{ TG.ready(); TG.expand(); }catch(e){} }
function haptic(kind){
  try{
    if(TG && TG.HapticFeedback){
      if(kind==='tick') TG.HapticFeedback.selectionChanged();
      else if(kind==='done') TG.HapticFeedback.notificationOccurred('success');
      else TG.HapticFeedback.impactOccurred(kind==='heavy'?'heavy':'medium');
    } else if(navigator.vibrate){ navigator.vibrate(kind==='heavy'?[120,60,120]:60); }
  }catch(e){}
}

/* ---------------- Sound ---------------- */
let AC=null;
function beep(freq=880, dur=0.12, type='sine', vol=0.25){
  if(!soundOn()) return;
  try{
    AC = AC || new (window.AudioContext||window.webkitAudioContext)();
    const o=AC.createOscillator(), g=AC.createGain();
    o.type=type; o.frequency.value=freq; o.connect(g); g.connect(AC.destination);
    g.gain.setValueAtTime(vol, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+dur);
    o.start(); o.stop(AC.currentTime+dur);
  }catch(e){}
}
const soundOn = ()=>$('soundChk').checked;

/* ---------------- Plank pose SVGs ---------------- */
const S = (inner)=>`<svg viewBox="0 0 200 200" fill="none" stroke="var(--accent)" stroke-width="7"
  stroke-linecap="round" stroke-linejoin="round">${inner}</svg>`;
const mat = `<line x1="18" y1="170" x2="182" y2="170" stroke="var(--line-2)" stroke-width="6"/>`;
// Side view, figure faces left (head at upper-left, feet lower-right). Mat at y=170.
// The plank body is ONE straight line: head → shoulder → hip → ankle. Support
// arm(s) drop from the shoulder to the mat. Head sits in line with the spine.
const POSE = {
  // forearm plank: straight body, upper arm vertical to elbow, forearm flat on mat
  forearm: S(`${mat}<circle cx="42" cy="100" r="11" fill="var(--accent)" stroke="none"/>
    <line x1="51" y1="105" x2="62" y2="110"/>
    <polyline points="62,110 120,140 174,166"/>
    <line x1="174" y1="166" x2="185" y2="169"/>
    <line x1="62" y1="110" x2="60" y2="168"/>
    <line x1="60" y1="168" x2="33" y2="170"/>`),
  // high plank: same straight body, arms fully extended to the mat
  high: S(`${mat}<circle cx="45" cy="85" r="11" fill="var(--accent)" stroke="none"/>
    <line x1="54" y1="90" x2="64" y2="96"/>
    <polyline points="64,96 122,128 176,160"/>
    <line x1="176" y1="160" x2="187" y2="163"/>
    <line x1="64" y1="96" x2="66" y2="170"/>`),
  // side plank: straight body rising to the head, support arm down, top arm up, feet stacked
  side: S(`${mat}<circle cx="54" cy="104" r="11" fill="var(--accent)" stroke="none"/>
    <line x1="63" y1="108" x2="76" y2="112"/>
    <polyline points="76,112 120,140 160,166"/>
    <line x1="160" y1="166" x2="171" y2="168"/>
    <line x1="76" y1="112" x2="72" y2="168"/>
    <line x1="76" y1="112" x2="84" y2="56"/>`),
  // shoulder taps: high plank, one hand lifted and reaching in toward the far shoulder
  taps: S(`${mat}<circle cx="45" cy="86" r="11" fill="var(--accent)" stroke="none"/>
    <line x1="54" y1="91" x2="64" y2="97"/>
    <polyline points="64,97 122,128 176,160"/>
    <line x1="176" y1="160" x2="187" y2="163"/>
    <line x1="64" y1="97" x2="66" y2="170"/>
    <polyline points="64,97 76,80 92,101"/>`),
  // plank leg lifts: forearm plank, one leg lifted off the mat behind
  leglift: S(`${mat}<circle cx="42" cy="100" r="11" fill="var(--accent)" stroke="none"/>
    <line x1="51" y1="105" x2="62" y2="110"/>
    <polyline points="62,110 120,140 174,166"/>
    <line x1="174" y1="166" x2="185" y2="169"/>
    <line x1="120" y1="140" x2="184" y2="120"/>
    <line x1="62" y1="110" x2="60" y2="168"/>
    <line x1="60" y1="168" x2="33" y2="170"/>`),
  // up-downs: forearm plank with an up/down motion arrow (the whole torso rises and lowers)
  updown: S(`${mat}<circle cx="42" cy="100" r="11" fill="var(--accent)" stroke="none"/>
    <line x1="51" y1="105" x2="62" y2="110"/>
    <polyline points="62,110 120,140 174,166"/>
    <line x1="174" y1="166" x2="185" y2="169"/>
    <line x1="62" y1="110" x2="60" y2="168"/>
    <line x1="60" y1="168" x2="33" y2="170"/>
    <g stroke="var(--rest)" stroke-width="6" fill="none">
      <line x1="90" y1="86" x2="90" y2="128"/>
      <polyline points="82,95 90,86 98,95"/>
      <polyline points="82,119 90,128 98,119"/>
    </g>`),
  // reverse plank: body faces UP, hands behind on the mat, hips lifted, feet forward flat
  reverse: S(`${mat}<circle cx="164" cy="104" r="11" fill="var(--accent)" stroke="none"/>
    <line x1="156" y1="109" x2="146" y2="114"/>
    <polyline points="146,114 100,138 52,166"/>
    <line x1="52" y1="166" x2="36" y2="168"/>
    <line x1="146" y1="114" x2="158" y2="168"/>`),
  // knee-to-elbow: plank with the front knee driving forward under the body
  knee: S(`${mat}<circle cx="46" cy="88" r="11" fill="var(--accent)" stroke="none"/>
    <line x1="55" y1="93" x2="64" y2="100"/>
    <line x1="64" y1="100" x2="120" y2="138"/>
    <line x1="120" y1="138" x2="174" y2="166"/>
    <line x1="174" y1="166" x2="185" y2="169"/>
    <polyline points="120,138 80,120 98,148"/>
    <line x1="64" y1="100" x2="66" y2="170"/>`),
};

/* ---------------- Exercises & programs ---------------- */
const EX = {
  forearm:  {name:"Forearm plank",       pose:"forearm", cue:"Elbows under shoulders, body one line, brace the core, breathe."},
  high:     {name:"High plank",          pose:"high",    cue:"Hands under shoulders, push the floor away, ribs down."},
  side_l:   {name:"Side plank, left",    pose:"side",    cue:"On left forearm, stack feet, lift hips, reach tall."},
  side_r:   {name:"Side plank, right",   pose:"side",    cue:"On right forearm, stack feet, lift hips, reach tall."},
  taps:     {name:"Shoulder taps",       pose:"taps",    cue:"High plank, tap opposite shoulder, keep hips dead still."},
  leglift:  {name:"Plank leg lifts",     pose:"leglift", cue:"Forearm plank, lift one leg a hand's height, alternate."},
  updown:   {name:"Plank up-downs",      pose:"updown",  cue:"Forearm to high plank and back, control every step."},
  reverse:  {name:"Reverse plank",       pose:"reverse", cue:"Hands behind, lift hips, open the chest, squeeze glutes."},
  knee:     {name:"Knee-to-elbow",       pose:"knee",    cue:"From plank drive knee to same elbow, alternate slow."},
};
const PROGRAMS = [
  {id:"beginner", name:"Beginner", desc:"Ease in, short holds",
   steps:[["forearm",20],["high",20],["side_l",15],["side_r",15],["forearm",25]]},
  {id:"standard", name:"Standard", desc:"The daily core builder",
   steps:[["forearm",30],["high",30],["taps",30],["side_l",25],["side_r",25],["leglift",30],["forearm",40]]},
  {id:"circuit",  name:"Variation Circuit", desc:"All the planks",
   steps:[["forearm",30],["high",30],["taps",30],["updown",30],["side_l",25],["side_r",25],["leglift",30],["knee",30],["reverse",25],["forearm",40]]},
];

/* ---------------- State ---------------- */
let sel = PROGRAMS[1];
let breakSecs = 20, workMul = 1.0;
let plan = [];
let idx = 0, remaining = 0, tickTimer = null, paused = false;
const $ = id => document.getElementById(id);

/* ---------------- Setup UI ---------------- */
function renderPrograms(){
  const c = $('programs'); c.innerHTML='';
  PROGRAMS.forEach((p,i)=>{
    const total = estimate(p);
    const el = document.createElement('button');
    el.className = 'prog' + (p===sel?' sel':'');
    el.innerHTML = `<div class="idx">${i+1}</div>
      <div class="meta"><div class="name">${p.name}</div><div class="desc">${p.desc} · ${p.steps.length} holds</div></div>
      <div class="tag">${fmtMin(total)}</div>`;
    el.onclick = ()=>{ sel=p; renderPrograms(); updateStartLen(); haptic('tick'); };
    c.appendChild(el);
  });
}
function estimate(p){
  let s=0; p.steps.forEach((st,i)=>{ s+=Math.round(st[1]*workMul); if(i<p.steps.length-1) s+=breakSecs; });
  return s;
}
function fmtMin(s){ const m=Math.floor(s/60), r=s%60; return m?`${m}m ${r?r+'s':''}`.trim():`${r}s`; }
function updateStartLen(){ $('startLen').textContent = fmtMin(estimate(sel)); $('sub').textContent = sel.name; }

$('breakSlider').oninput = e=>{ breakSecs=+e.target.value; $('breakVal').textContent=breakSecs; renderPrograms(); updateStartLen(); };
$('workSlider').oninput  = e=>{ workMul=+e.target.value/100; $('workVal').textContent=e.target.value; renderPrograms(); updateStartLen(); };

/* ---------------- Build plan & run ---------------- */
function buildPlan(){
  plan=[]; sel.steps.forEach((st,i)=>{
    plan.push({type:'work', ex:st[0], secs:Math.max(5,Math.round(st[1]*workMul))});
    if(i<sel.steps.length-1) plan.push({type:'break', ex:null, secs:breakSecs});
  });
}
function show(screen){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); $(screen).classList.add('active'); }

function start(){
  buildPlan(); idx=0; paused=false; show('run'); renderDots(); loadStep();
  if(TG){ try{ TG.MainButton.hide(); }catch(e){} }
}
function loadStep(){
  const step = plan[idx];
  remaining = step.secs;
  const isBreak = step.type==='break';
  $('stage').className = 'stage'+(isBreak?' break':'');
  $('stage').textContent = isBreak ? 'BREAK' : 'HOLD';
  $('time').className = 'time'+(isBreak?' break':'');
  if(isBreak){
    $('exname').textContent = 'Rest';
    $('pose').innerHTML = '';
    const upcoming = plan[idx+1] && EX[plan[idx+1].ex];
    $('cue').textContent = upcoming ? 'Next: '+upcoming.name : '';
  }else{
    const e = EX[step.ex];
    $('exname').textContent = e.name;
    $('pose').innerHTML = POSE[e.pose] || '';
    $('cue').textContent = e.cue;
  }
  const workLeft = plan.slice(idx).filter(s=>s.type==='work').length;
  $('upnext').innerHTML = `Hold <b>${sel.steps.length - workLeft + (isBreak?0:1)}</b> of ${sel.steps.length}`;
  renderDots();
  updateRing(1); render();
  haptic(isBreak?'medium':'heavy'); beep(isBreak?523:784, .15, 'sine');
  clearInterval(tickTimer); tickTimer=setInterval(tick, 1000);
}
function tick(){
  if(paused) return;
  remaining--;
  if(remaining<=0){ next(); return; }
  if(remaining<=3){ beep(1046,.09,'sine',.28); haptic('tick'); }
  render();
}
function render(){
  $('time').textContent = String(Math.max(0,remaining)).padStart(2,'0');
  const step=plan[idx]; updateRing(remaining/step.secs);
}
function updateRing(frac){
  const C=289.02; $('ringFg').style.strokeDashoffset = String(C*(1-Math.max(0,Math.min(1,frac))));
  $('ringFg').setAttribute('stroke', plan[idx] && plan[idx].type==='break' ? 'var(--rest)' : 'var(--accent)');
}
function next(){
  clearInterval(tickTimer);
  if(idx>=plan.length-1){ finish(); return; }
  idx++; loadStep();
}
function renderDots(){
  const holds = sel.steps.length; const cur = plan[idx];
  let doneHolds = plan.slice(0,idx).filter(s=>s.type==='work').length;
  const d=$('dots'); d.innerHTML='';
  for(let i=0;i<holds;i++){
    const dot=document.createElement('div'); dot.className='dot';
    if(i<doneHolds) dot.classList.add('done');
    else if(i===doneHolds && cur && cur.type==='work') dot.classList.add('cur');
    d.appendChild(dot);
  }
}
function finish(){
  clearInterval(tickTimer); show('done'); haptic('done'); beep(587,.16); setTimeout(()=>beep(880,.3),150);
  const totalHold = sel.steps.reduce((a,s)=>a+Math.round(s[1]*workMul),0);
  $('doneStat').textContent = `${sel.name} · ${sel.steps.length} holds · ${fmtMin(totalHold)} under tension`;
  try{ if(TG) TG.sendData(JSON.stringify({event:'plank_done', program:sel.id, holds:sel.steps.length, hold_secs:totalHold})); }catch(e){}
}

/* controls */
$('startBtn').onclick = ()=>{ if(AC){try{AC.resume()}catch(e){}} start(); };
$('pauseBtn').onclick = ()=>{ paused=!paused; $('pauseBtn').textContent = paused?'Resume':'Pause'; haptic('tick'); };
$('skipBtn').onclick  = ()=>{ next(); };
$('stopBtn').onclick  = ()=>{ clearInterval(tickTimer); show('setup'); };
$('againBtn').onclick = ()=>{ show('setup'); };

/* clock */
setInterval(()=>{ const d=new Date(); $('clock').textContent = d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}); }, 1000);

renderPrograms(); updateStartLen();
</script>
</body>
